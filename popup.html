<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Downloader Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <img src="icons/icon48.png" alt="Logo" class="logo">
        <div>
          <h1 class="title">Media Downloader</h1>
          <span class="version">v1.4.4 Multi-Platform</span>
        </div>
      </div>
      <div id="statusBadge" class="status-badge active">
        <span class="status-dot"></span>
        <span id="statusText">已啟用</span>
      </div>
    </header>

    <!-- Main Switch Card -->
    <div class="card switch-card">
      <div class="card-info">
        <span class="card-title">啟用懸停下載按鈕</span>
        <span class="card-desc">移至貼文圖片/影片時顯示下載圖示</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="extensionToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- Supported Platforms Badge List -->
    <div class="card platforms-card">
      <span class="card-title">🌐 已支援的社群媒體平台</span>
      <div class="platform-tags">
        <span class="tag">Threads</span>
        <span class="tag">Instagram</span>
        <span class="tag">X (Twitter)</span>
        <span class="tag">Facebook</span>
        <span class="tag">Pinterest</span>
      </div>
    </div>

    <!-- Filename Setting Card -->
    <div class="card settings-card">
      <div class="card-header">
        <span class="card-title">📁 下載檔名格式</span>
      </div>
      <div class="setting-group">
        <select id="filenameFormatSelect" class="select-input">
          <option value="default">預設 (平台_Media_時間)</option>
          <option value="custom">自訂字首 (自訂前綴_時間)</option>
        </select>
        <div id="customPrefixContainer" class="custom-prefix-box hidden">
          <input type="text" id="customPrefixInput" class="text-input" placeholder="輸入前綴 (例: MySaved)" value="Social_Media">
        </div>
      </div>
    </div>

    <!-- History Card -->
    <div class="card history-card">
      <div class="card-header space-between">
        <span class="card-title">🕒 最近下載紀錄</span>
        <button id="clearHistoryBtn" class="btn-text" type="button">清除紀錄</button>
      </div>
      <div id="historyList" class="history-list">
        <!-- History Items Inserted Dynamically -->
        <div class="empty-state">尚無下載紀錄</div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Social Media Downloader &copy; 2026</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
